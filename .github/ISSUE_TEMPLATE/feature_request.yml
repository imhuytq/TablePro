name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature and the problem it solves. Include mockups or examples if you have them.
      placeholder: |
        I'd like TablePro to support X because...
    validations:
      required: true
