name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include steps to reproduce if possible.
      placeholder: |
        When I click X, Y happens instead of Z.

        Steps to reproduce:
        1. Open a MySQL connection
        2. ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "TablePro version, macOS version, chip (e.g. 0.5.0 / macOS 15.3 / Apple Silicon)"
      placeholder: "0.5.0 / macOS 15.3 / Apple Silicon"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots, screen recordings, or crash logs.
    validations:
      required: false
